workflow:
  rules:
    - if: $CI_COMMIT_BRANCH

stages:
  - test
  - release

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  key:
    files:
      - python/uv.lock
      - python/pyproject.toml
  paths:
    - .cache/uv
    - python/.venv/

pytest:
  image: python:3.11
  stage: test
  before_script:
    - python --version
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - /root/.local/bin/uv --version
  script:
    - cd python
    - /root/.local/bin/uv run pytest -v --junitxml=pytest.xml --cov=marple --cov-report=term-missing --cov-report=xml:coverage.xml
  artifacts:
    when: always
    reports:
      junit: python/pytest.xml
      coverage_report:
        coverage_format: cobertura
        path: python/coverage.xml
    paths:
      - python/pytest.xml
      - python/coverage.xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - python/**/*

rust:mdb-cli:
  image: rust:1.93
  stage: test
  cache:
    key:
      files:
        - mdb-cli/Cargo.lock
        - mdb-cli/Cargo.toml
    paths:
      - mdb-cli/target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - rustc --version
    - cargo --version
    - apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates
  script:
    - cd mdb-cli
    - cargo test --locked
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - mdb-cli/**/*

rust:parquet-transcode:
  image: rust:1.93
  stage: test
  cache:
    key:
      files:
        - parquet-transcode/Cargo.lock
        - parquet-transcode/Cargo.toml
    paths:
      - parquet-transcode/target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - rustc --version
    - cargo --version
  script:
    - cd parquet-transcode
    - cargo test
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - parquet-transcode/**/*

build:parquet-transcode:
  image: rust:1.93
  stage: release
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  cache:
    key:
      files:
        - parquet-transcode/Cargo.lock
        - parquet-transcode/Cargo.toml
    paths:
      - parquet-transcode/target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - rustc --version
    - cargo --version
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz --strip-components=1 -C /usr/local/bin docker/docker
    - docker version
    - cargo install cross --git https://github.com/cross-rs/cross
  script:
    - cd parquet-transcode
    - cross build --release --target x86_64-pc-windows-gnu
    - cross build --release --target x86_64-unknown-linux-gnu
    - cross build --release --target x86_64-apple-darwin
    - cross build --release --target aarch64-apple-darwin
    - mkdir -p artifacts
    - cp target/x86_64-pc-windows-gnu/release/parquet-transcode.exe artifacts/parquet-transcode-windows-x64.exe
    - cp target/x86_64-unknown-linux-gnu/release/parquet-transcode artifacts/parquet-transcode-linux-x64
    - cp target/x86_64-apple-darwin/release/parquet-transcode artifacts/parquet-transcode-darwin-x64
    - cp target/aarch64-apple-darwin/release/parquet-transcode artifacts/parquet-transcode-darwin-arm64
  artifacts:
    paths:
      - parquet-transcode/artifacts/
  rules:
    - when: manual

build:mdb-cli:
  image: rust:1.93
  stage: release
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  cache:
    key:
      files:
        - mdb-cli/Cargo.lock
        - mdb-cli/Cargo.toml
    paths:
      - mdb-cli/target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - rustc --version
    - cargo --version
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz --strip-components=1 -C /usr/local/bin docker/docker
    - docker version
    - cargo install cross --git https://github.com/cross-rs/cross
  script:
    - cd mdb-cli
    - cross build --release --target x86_64-pc-windows-gnu
    - cross build --release --target x86_64-unknown-linux-gnu
    - cross build --release --target x86_64-apple-darwin
    - cross build --release --target aarch64-apple-darwin
    - mkdir -p artifacts
    - cp target/x86_64-pc-windows-gnu/release/mdb.exe artifacts/mdb-windows-x64.exe
    - cp target/x86_64-unknown-linux-gnu/release/mdb artifacts/mdb-linux-x64
    - cp target/x86_64-apple-darwin/release/mdb artifacts/mdb-darwin-x64
    - cp target/aarch64-apple-darwin/release/mdb artifacts/mdb-darwin-arm64
  artifacts:
    paths:
      - mdb-cli/artifacts/
  rules:
    - when: manual

pages:
  image: python:3.11
  stage: release
  before_script:
    - python --version
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - /root/.local/bin/uv --version
  script:
    - cd python
    - /root/.local/bin/uv run --group docs sphinx-build -b html docs docs/_build/html
    - mkdir -p ../public
    - cp -r docs/_build/html/* ../public/
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH
      when: manual
